<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOGEE - Spin to Win!</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#0a0a0f;color:#fff;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(247,201,72,0.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(255,107,0,0.05) 0%,transparent 50%);pointer-events:none}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;animation:orbFloat 6s ease-in-out infinite}
.orb1{width:400px;height:400px;background:rgba(247,201,72,0.07);top:-100px;left:-100px}
.orb2{width:300px;height:300px;background:rgba(255,107,0,0.05);bottom:0;right:-50px;animation-delay:3s}
@keyframes orbFloat{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.coin{position:fixed;pointer-events:none;animation:floatUp linear infinite;opacity:0.12;font-size:24px}
@keyframes floatUp{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:0.12}90%{opacity:0.12}100%{transform:translateY(-100px) rotate(360deg);opacity:0}}
header{text-align:center;padding:40px 20px 20px;position:relative;z-index:1}
.logo-emoji{font-size:60px;display:block;animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
h1{font-family:'Bangers',cursive;font-size:clamp(52px,12vw,90px);letter-spacing:4px;background:linear-gradient(135deg,#f7c948,#ff6b00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:8px}
.subtitle{font-family:'Bangers',cursive;font-size:clamp(14px,3vw,20px);letter-spacing:3px;color:#555;margin-bottom:16px}
.devnet-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(0,217,255,0.08);border:1px solid rgba(0,217,255,0.2);border-radius:50px;padding:6px 16px;font-size:12px;font-weight:700;color:#00d9ff;font-family:monospace;letter-spacing:1px}
.dot{width:7px;height:7px;border-radius:50%;background:#00d9ff;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
main{display:flex;flex-direction:column;align-items:center;padding:24px 20px;gap:24px;position:relative;z-index:1}
.wallet-wrap{width:100%;max-width:480px}
label{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:8px;letter-spacing:2px;text-transform:uppercase}
input{width:100%;background:#16161f;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px 20px;color:#fff;font-size:13px;font-family:monospace;outline:none;transition:all 0.2s}
input:focus{border-color:#f7c948;box-shadow:0 0 16px rgba(247,201,72,0.1)}
input::placeholder{color:#333}
.error{color:#ff4466;font-size:13px;margin-top:8px;font-weight:600;display:none}
.wheel-wrap{position:relative;display:inline-block}
.pointer{position:absolute;top:-14px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:13px solid transparent;border-right:13px solid transparent;border-top:26px solid #f7c948;filter:drop-shadow(0 0 8px #f7c948);z-index:10}
canvas{border-radius:50%;display:block;max-width:100%}
.rewards{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:480px}
.reward-item{background:#16161f;border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:6px 12px;display:flex;align-items:center;gap:6px;font-size:12px}
.reward-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.reward-label{font-weight:700}
.reward-chance{color:#444;font-size:10px}
.spin-btn{background:linear-gradient(135deg,#f7c948,#ff6b00);color:#000;border:none;border-radius:14px;padding:18px 56px;font-size:22px;font-weight:900;font-family:'Bangers',cursive;letter-spacing:3px;cursor:pointer;box-shadow:0 0 40px rgba(247,201,72,0.35);transition:all 0.3s;min-width:220px}
.spin-btn:hover{transform:translateY(-2px);box-shadow:0 0 60px rgba(247,201,72,0.5)}
.spin-btn:disabled{background:rgba(255,255,255,0.05);color:#333;cursor:not-allowed;box-shadow:none;transform:none}
.spin-hint{color:#333;font-size:12px;font-family:monospace}
footer{text-align:center;padding:30px 20px;color:#222;font-size:12px;font-family:monospace;position:relative;z-index:1}
/* Popup */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;display:none}
.popup-overlay.show{display:flex}
.popup{background:#16161f;border-radius:24px;padding:40px 32px;max-width:400px;width:100%;text-align:center;position:relative;overflow:hidden;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes popIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
.popup.win{border:2px solid #f7c948;box-shadow:0 0 60px rgba(247,201,72,0.25)}
.popup.lose{border:2px solid #333}
.popup-emoji{font-size:64px;margin-bottom:16px;display:block}
.popup-title{font-family:'Bangers',cursive;font-size:40px;letter-spacing:2px;margin-bottom:8px}
.popup.win .popup-title{color:#f7c948}
.popup.lose .popup-title{color:#555}
.popup-amount{font-size:28px;font-weight:900;color:#fff;margin-bottom:20px}
.tx-box{background:rgba(0,255,148,0.06);border:1px solid rgba(0,255,148,0.15);border-radius:12px;padding:16px;margin-bottom:20px}
.tx-label{color:#00ff94;font-size:12px;font-weight:700;margin-bottom:8px}
.tx-hash{font-family:monospace;font-size:11px;color:#555;word-break:break-all;margin-bottom:10px}
.tx-link{display:inline-block;background:rgba(0,255,148,0.1);color:#00ff94;padding:6px 16px;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none}
.popup-btn{width:100%;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all 0.2s}
.popup.win .popup-btn{background:linear-gradient(135deg,#f7c948,#ff6b00);color:#000}
.popup.lose .popup-btn{background:rgba(255,255,255,0.08);color:#fff}
.popup-btn:hover{transform:translateY(-1px)}
/* Confetti */
.confetti-piece{position:fixed;width:10px;height:10px;top:-10px;animation:confettiFall linear forwards;pointer-events:none;z-index:999;border-radius:2px}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@media(max-width:500px){.spin-btn{padding:16px 40px;font-size:18px}}
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<!-- Floating coins -->
<script>
['🪙','💰','🐕','⭐','💎','🎯'].forEach((e,i)=>{
  const d=document.createElement('div');
  d.className='coin'; d.textContent=e;
  d.style.cssText=`left:${10+i*16}%;animation-duration:${9+i*2}s;animation-delay:${i*1.5}s`;
  document.body.appendChild(d);
});
</script>

<header>
  <span class="logo-emoji">🐕</span>
  <h1>DOGEE</h1>
  <p class="subtitle">SPIN TO WIN · SOLANA DEVNET</p>
  <div class="devnet-badge"><span class="dot"></span> SOLANA DEVNET · TEST MODE</div>
</header>

<main>
  <!-- Wallet -->
  <div class="wallet-wrap">
    <label>Your Solana Wallet Address</label>
    <input id="walletInput" placeholder="Paste your Solana wallet address..." />
    <p class="error" id="errorMsg"></p>
  </div>

  <!-- Wheel -->
  <div class="wheel-wrap">
    <div class="pointer"></div>
    <canvas id="wheel" width="340" height="340"></canvas>
  </div>

  <!-- Rewards legend -->
  <div class="rewards">
    <div class="reward-item"><span class="reward-dot" style="background:#ff6b00"></span><span class="reward-label" style="color:#ff6b00">100 DOGEE</span><span class="reward-chance">3%</span></div>
    <div class="reward-item"><span class="reward-dot" style="background:#f7c948"></span><span class="reward-label" style="color:#f7c948">50 DOGEE</span><span class="reward-chance">7%</span></div>
    <div class="reward-item"><span class="reward-dot" style="background:#00d9ff"></span><span class="reward-label" style="color:#00d9ff">10 DOGEE</span><span class="reward-chance">15%</span></div>
    <div class="reward-item"><span class="reward-dot" style="background:#00ff94"></span><span class="reward-label" style="color:#00ff94">5 DOGEE</span><span class="reward-chance">25%</span></div>
    <div class="reward-item"><span class="reward-dot" style="background:#444"></span><span class="reward-label" style="color:#666">Try Again</span><span class="reward-chance">50%</span></div>
  </div>

  <!-- Spin button -->
  <button class="spin-btn" id="spinBtn" onclick="doSpin()">🎡 SPIN TO WIN!</button>
  <p class="spin-hint">Max 3 spins per hour · Solana Devnet</p>
</main>

<footer>DOGEE · Solana Devnet · Not financial advice · For testing only</footer>

<!-- Result Popup -->
<div class="popup-overlay" id="popupOverlay">
  <div class="popup" id="popup">
    <span class="popup-emoji" id="popupEmoji"></span>
    <div class="popup-title" id="popupTitle"></div>
    <div class="popup-amount" id="popupAmount"></div>
    <div class="tx-box" id="txBox" style="display:none">
      <div class="tx-label">✅ Transaction Confirmed on Devnet!</div>
      <div class="tx-hash" id="txHash"></div>
      <a class="tx-link" id="txLink" href="#" target="_blank">View on Solana Explorer ↗</a>
    </div>
    <button class="popup-btn" id="popupBtn" onclick="closePopup()"></button>
  </div>
</div>

<script>
const API = 'https://dogee-backend.onrender.com';

// ── WHEEL ──
const SEGMENTS = [
  {label:'Try Again', color:'#1a1a2a', text:'#555'},
  {label:'5 DOGEE',   color:'#0d2010', text:'#00ff94'},
  {label:'10 DOGEE',  color:'#0d1828', text:'#00d9ff'},
  {label:'Try Again', color:'#1a1a2a', text:'#555'},
  {label:'50 DOGEE',  color:'#281a08', text:'#f7c948'},
  {label:'Try Again', color:'#1a1a2a', text:'#555'},
  {label:'100 DOGEE', color:'#280d10', text:'#ff6b00'},
  {label:'5 DOGEE',   color:'#0d2010', text:'#00ff94'},
];
const N = SEGMENTS.length;
let rot = 0, spinning = false;

function drawWheel(r) {
  const c = document.getElementById('wheel');
  const ctx = c.getContext('2d');
  const sz = c.width, cx = sz/2, cy = sz/2, radius = sz/2 - 6;
  const arc = (2*Math.PI)/N;
  ctx.clearRect(0,0,sz,sz);

  // Glow
  const g = ctx.createRadialGradient(cx,cy,radius-20,cx,cy,radius+6);
  g.addColorStop(0,'rgba(247,201,72,0.35)'); g.addColorStop(1,'rgba(247,201,72,0)');
  ctx.beginPath(); ctx.arc(cx,cy,radius+6,0,2*Math.PI); ctx.fillStyle=g; ctx.fill();

  SEGMENTS.forEach((s,i)=>{
    const sa = arc*i+r, ea = sa+arc;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,radius,sa,ea); ctx.closePath();
    ctx.fillStyle=s.color; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=2; ctx.stroke();
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(sa+arc/2);
    ctx.textAlign='right'; ctx.fillStyle=s.text;
    ctx.font=`bold ${s.label.length>8?12:14}px Nunito`;
    ctx.shadowColor=s.text; ctx.shadowBlur=6;
    ctx.fillText(s.label, radius-14, 5); ctx.restore();
  });

  // Center
  const cg = ctx.createRadialGradient(cx,cy,0,cx,cy,34);
  cg.addColorStop(0,'#f7c948'); cg.addColorStop(1,'#ff6b00');
  ctx.beginPath(); ctx.arc(cx,cy,34,0,2*Math.PI);
  ctx.fillStyle=cg; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=3; ctx.stroke();
  ctx.font='26px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowBlur=0; ctx.fillText('🐕',cx,cy);
}
drawWheel(0);

// ── SPIN ──
const LABEL_TO_IDX = {'Try Again':0,'5 DOGEE':1,'10 DOGEE':2,'50 DOGEE':4,'100 DOGEE':6};

async function doSpin() {
  const wallet = document.getElementById('walletInput').value.trim();
  const errEl = document.getElementById('errorMsg');
  errEl.style.display='none';

  if(!wallet){errEl.textContent='⚠️ Paste your Solana wallet address first!';errEl.style.display='block';return;}
  if(wallet.length < 32){errEl.textContent='⚠️ Invalid wallet address!';errEl.style.display='block';return;}
  if(spinning) return;

  spinning=true;
  const btn=document.getElementById('spinBtn');
  btn.disabled=true; btn.textContent='SPINNING...';

  // Spin sound
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.frequency.setValueAtTime(150,ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(900,ac.currentTime+0.4);
    g.gain.setValueAtTime(0.25,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.5);
    o.start();o.stop(ac.currentTime+0.5);
  }catch(e){}

  try{
    const res = await fetch(API+'/api/spin',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({walletAddress:wallet})
    });
    const data = await res.json();

    if(!res.ok) throw new Error(data.error||'Server error');

    // Target segment
    const idx = LABEL_TO_IDX[data.label]??0;
    const arc = (2*Math.PI)/N;
    const target = -(idx*arc+arc/2) + Math.PI/2;
    const spins = 6+Math.random()*4;
    const endRot = rot + spins*2*Math.PI + (target - rot%(2*Math.PI));

    const start=performance.now(), dur=4200, startRot=rot;
    function ease(t){return 1-Math.pow(1-t,3);}
    function animate(now){
      const t=Math.min((now-start)/dur,1);
      rot=startRot+(endRot-startRot)*ease(t);
      drawWheel(rot);
      if(t<1){requestAnimationFrame(animate);}
      else{
        spinning=false;
        btn.disabled=false; btn.textContent='🎡 SPIN TO WIN!';
        showResult(data);
      }
    }
    requestAnimationFrame(animate);

  }catch(err){
    spinning=false;
    btn.disabled=false; btn.textContent='🎡 SPIN TO WIN!';
    errEl.textContent='⚠️ '+(err.message||'Something went wrong!');
    errEl.style.display='block';
  }
}

// ── RESULT POPUP ──
function showResult(data){
  const win = data.result==='win';
  const popup=document.getElementById('popup');
  popup.className='popup '+(win?'win':'lose');
  document.getElementById('popupEmoji').textContent=win?'🎉':'😢';
  document.getElementById('popupTitle').textContent=win?'YOU WON!':'TRY AGAIN!';
  document.getElementById('popupAmount').textContent=win?data.amount+' DOGEE 🐕':'Better luck next time!';

  const txBox=document.getElementById('txBox');
  if(win&&data.txHash){
    txBox.style.display='block';
    document.getElementById('txHash').textContent=data.txHash;
    document.getElementById('txLink').href=data.explorerUrl||'https://explorer.solana.com/?cluster=devnet';
  } else { txBox.style.display='none'; }

  document.getElementById('popupBtn').textContent=win?'AWESOME! 🐕':'SPIN AGAIN!';
  document.getElementById('popupOverlay').classList.add('show');

  if(win){ spawnConfetti(); playWinSound(); }
}

function closePopup(){
  document.getElementById('popupOverlay').classList.remove('show');
  document.querySelectorAll('.confetti-piece').forEach(e=>e.remove());
}

function playWinSound(){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    [523,659,784,1047].forEach((f,i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=f; o.type='sine';
      g.gain.setValueAtTime(0.18,ac.currentTime+i*0.13);
      g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.13+0.3);
      o.start(ac.currentTime+i*0.13); o.stop(ac.currentTime+i*0.13+0.35);
    });
  }catch(e){}
}

function spawnConfetti(){
  const colors=['#f7c948','#ff6b00','#00ff94','#00d9ff','#fff','#ff44cc'];
  for(let i=0;i<80;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;transform:rotate(${Math.random()*360}deg)`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3500);
  }
}
</script>
</body>
</html>
